name: Refresh data + recompute tiers

on:
  schedule:
    # Voter file: weekly during active campaigns + monthly otherwise
    # We just run weekly on Mondays at 06:17 UTC; the script is cheap.
    - cron: "17 6 * * 1"
  workflow_dispatch:
    inputs:
      anchor_date:
        description: "Campaign anchor date (YYYY-MM-DD); leave blank for today"
        required: false
        default: ""

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TARGET_ZIPS: ${{ vars.TARGET_ZIPS || '44236' }}
      TARGET_CITY: ${{ vars.TARGET_CITY || 'HUDSON' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r scripts/requirements.txt

      # Parcels: ArcGIS + SC706_SALES.zip
      - name: Refresh parcels
        run: python scripts/load_parcels.py

      # Voter file: requires the latest snapshot to be checked in to repo
      # OR fetched from Ohio SOS. For v1 the operator hands us the file
      # and we commit it under data/voter/. The path here matches.
      - name: Load voter file
        run: |
          if [ -f "data/voter/latest.csv" ]; then
            python scripts/load_voter_file.py data/voter/latest.csv
          else
            echo "::warning::no voter file at data/voter/latest.csv — skipping voter refresh"
          fi

      # Datazapp: refreshed annually before each spring campaign
      - name: Load Datazapp (if present)
        run: |
          if [ -f "data/datazapp/latest.csv" ]; then
            python scripts/load_datazapp.py data/datazapp/latest.csv --label spring2026
          else
            echo "::warning::no Datazapp file at data/datazapp/latest.csv — skipping"
          fi

      # Build the household spine + recompute tiers
      - name: Build households
        run: |
          if [ -n "${{ github.event.inputs.anchor_date }}" ]; then
            python scripts/build_households.py --anchor ${{ github.event.inputs.anchor_date }}
          else
            python scripts/build_households.py
          fi
