name: Email digest

on:
  schedule:
    # Run daily at 11:00 UTC = 7:00 AM ET (the default email_send_hour_local).
    # The send_digest.py script filters per-user by cadence (daily / weekdays / weekly_monday).
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      DIGEST_FROM: ${{ vars.DIGEST_FROM || 'Hudson HS Parents <noreply@example.com>' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/send_digest.py
