name: Push DB migrations

on:
  push:
    branches: [main]
    paths: ["supabase/migrations/**", "supabase/functions/**", ".github/workflows/deploy-db.yml"]
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Guard on Supabase deploy secrets
        if: ${{ env.SUPABASE_ACCESS_TOKEN == '' || env.SUPABASE_PROJECT_REF == '' || env.SUPABASE_DB_PASSWORD == '' }}
        run: |
          echo "::error::deploy-db requires SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, and SUPABASE_DB_PASSWORD as repo secrets. Set them via 'gh secret set <NAME> -R adam567/heatmap'. Today's migration was applied via the Supabase MCP, so this failing is non-blocking until the next migration."
          exit 1
      - uses: supabase/setup-cli@v1
        with: { version: latest }
      - run: supabase link --project-ref "$SUPABASE_PROJECT_REF" -p "$SUPABASE_DB_PASSWORD"
      - run: supabase db push -p "$SUPABASE_DB_PASSWORD" --include-all
      - name: Deploy Edge Functions
        run: |
          for f in supabase/functions/*/; do
            name=$(basename "$f")
            supabase functions deploy "$name" --no-verify-jwt
          done
